# Axiom Frontend (SPA React CRA) — servido como estatico pelo Nginx.
#
# OBS: em producao real, o recomendado e usar o Vercel para o frontend.
# Este arquivo e pra servir de fallback no proprio servidor ou ambiente de staging.
#
# Template. Ajuste `server_name` para seu dominio. Depois rode:
#   certbot --nginx -d app.seudominio.com --non-interactive --agree-tos \
#           --register-unsafely-without-email --redirect

server {
    listen 80;
    listen [::]:80;
    server_name app.SEU-DOMINIO-OU-SSLIP.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Path do `npm run build` do CRA
    root /home/root/webapp/frontend/build;
    index index.html;

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|svg|webp|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Favicon silencioso (evita 404 nos logs)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # SPA fallback: rotas como /login /register /admin/panel caem em index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;
        add_header X-Frame-Options SAMEORIGIN;
    }
}

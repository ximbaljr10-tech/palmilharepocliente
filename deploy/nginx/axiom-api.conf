# Axiom Backend — reverse proxy para FastAPI (127.0.0.1:8001)
#
# Template. Ajuste `server_name` para seu dominio (ex: api.seudominio.com).
# Depois de subir o arquivo e testar com `nginx -t`, rode:
#   certbot --nginx -d api.seudominio.com --non-interactive --agree-tos \
#           --register-unsafely-without-email --redirect
# O certbot vai automaticamente adicionar o bloco `listen 443 ssl` e fazer o redirect 80->443.

server {
    listen 80;
    listen [::]:80;
    server_name api.SEU-DOMINIO-OU-SSLIP.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload grande (8MB configurado no backend + folga)
        client_max_body_size 20m;

        # Timeouts generosos (operacoes do Baileys/PIX podem demorar)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

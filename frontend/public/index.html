<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta
            name="description"
            content="Axiom Biomechanics — Plataforma de palmilhas ortopédicas personalizadas para profissionais da saúde dos pés."
        />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <title>Axiom Biomechanics</title>
        <script>
            // Silencia um erro de DOMException conhecido em alguns navegadores.
            window.addEventListener(
                "error",
                function (e) {
                    if (
                        e.error instanceof DOMException &&
                        e.error.name === "DataCloneError" &&
                        e.message &&
                        e.message.includes("PerformanceServerTiming")
                    ) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true,
            );
        </script>
    </head>
    <body>
        <noscript>Você precisa habilitar JavaScript para usar esta aplicação.</noscript>
        <div id="root"></div>
    </body>
</html>
